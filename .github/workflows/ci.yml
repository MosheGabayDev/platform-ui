name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    name: typecheck + lint + test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Coverage gate (ADR-042)
        run: node scripts/check-coverage-baseline.mjs

      - name: High-risk commit gate (ADR-037)
        run: node scripts/check-high-risk-commit.mjs
        env:
          GITHUB_BASE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Build
        run: npm run build
